<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таблица умножения Анисович В.Д. - Тренажер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
            background: #f8f0e7;
            font-family: 'Quicksand', sans-serif;
            padding: 0;
        }

        .game {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            background: rgba(255, 250, 240, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 0;
            padding: 20px 16px;
            box-shadow: none;
        }

        /* Счётчики и кнопки в один ряд */
        .stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .stat-item, .stat-btn {
            background: #ffffffcc;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 2rem;
            font-weight: 600;
            color: #4a4a4a;
            border: 1px solid #ffe7d4;
            text-align: center;
            min-width: 70px;
            transition: background 0.2s;
        }

        .stat-btn {
            cursor: pointer;
            user-select: none;
            font-size: 2rem;
            padding: 8px 16px;
        }

        .stat-btn.active {
            background: #c8e6c9;
            border-color: #81c784;
        }

        .correct { color: #7fb285; }
        .wrong { color: #f0a3a3; }

        /* Карточка */
        .card-wrapper {
            perspective: 1500px;
            cursor: pointer;
            flex: 0 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
            border-radius: 40px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 700;
            padding: 15px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .front {
            background: #ffe3d0;
            color: #9f7e69;
        }

        .back {
            background: #d9e3f0;
            color: #6b7f8f;
            transform: rotateY(180deg);
        }

        /* Блок вариантов / ввода */
        .options, .input-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 600;
            color: #5f4e3e;
            cursor: pointer;
            transition: transform 0.1s ease;
            border: 2px solid white;
        }

        .option:active {
            transform: translateY(5px);
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .option:nth-child(1) { background: #fccfcf; }
        .option:nth-child(2) { background: #fae1b0; }
        .option:nth-child(3) { background: #c6e2d4; }

        /* Поле ввода для взрослого режима */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #answerInput {
            width: 120px;
            height: 80px;
            border-radius: 30px;
            border: 2px solid #ffe7d4;
            background: white;
            font-size: 2.8rem;
            font-weight: 600;
            text-align: center;
            color: #5f4e3e;
            outline: none;
            font-family: 'Quicksand', sans-serif;
        }

        #submitAnswer {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #c6e2d4;
            border: 2px solid white;
            font-size: 2.8rem;
            font-weight: 600;
            color: #5f4e3e;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #submitAnswer:active {
            transform: translateY(5px);
        }

        #submitAnswer.disabled, #answerInput.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        /* Адаптация */
        @media (orientation: portrait) {
            .game {
                padding: 80px 12px;
            }
            .card {
                max-width: 400px;
            }
            .front, .back {
                font-size: clamp(4rem, 12vw, 8rem);
            }
            .option, #answerInput, #submitAnswer {
                width: 90px;
                height: 90px;
                font-size: 2.8rem;
            }
            #answerInput {
                width: 200px;
            }
        }

        @media (orientation: landscape) {
            .game {
                padding: 20px 12px;
            }
            .stats {
                gap: 8px;
            }
            .stat-item, .stat-btn {
                padding: 4px 12px;
                font-size: 1.6rem;
            }
            .card {
                aspect-ratio: 16 / 9;
            }
            .front, .back {
                font-size: clamp(2.5rem, 8vw, 5rem);
            }
            .options, .input-area {
                gap: 12px;
                margin: 5px 0;
            }
            .option, #answerInput, #submitAnswer {
                font-size: 1.8rem;
            }
            #answerInput {
                width: 200px;
            }
        }

        @media (max-width: 360px) {
            .stat-item, .stat-btn {
                padding: 4px 8px;
                font-size: 1.4rem;
            }
            .option, #answerInput, #submitAnswer {
                width: 50px;
                height: 50px;
                font-size: 1.6rem;
            }
            #answerInput {
                width: 80px;
            }
        }
    </style>
</head>
<body>
<div class="game">
    <!-- Статистика и кнопки управления -->
    <div class="stats">
        <div class="stat-item correct" id="correctCount">0</div>
        <div class="stat-item wrong" id="wrongCount">0</div>
        <div class="stat-btn" id="timerBtn" title="Авто-смена (7 сек)">⏳</div>
        <div class="stat-btn" id="modeBtn" title="Режим: младенец">👶</div>
    </div>

    <!-- Карточка -->
    <div class="card-wrapper" id="cardWrapper">
        <div class="card" id="card">
            <div class="front" id="questionDisplay">2 × 2</div>
            <div class="back" id="answerDisplay">4</div>
        </div>
    </div>

    <!-- Контейнер для вариантов / ввода -->
    <div id="answerContainer"></div>
</div>

<script>
    (function() {
        // ------ Элементы ------
        const cardWrapper = document.getElementById('cardWrapper');
        const card = document.getElementById('card');
        const questionDisplay = document.getElementById('questionDisplay');
        const answerDisplay = document.getElementById('answerDisplay');
        const correctSpan = document.getElementById('correctCount');
        const wrongSpan = document.getElementById('wrongCount');
        const timerBtn = document.getElementById('timerBtn');
        const modeBtn = document.getElementById('modeBtn');
        const answerContainer = document.getElementById('answerContainer');

        // ------ Состояние ------
        let currentQuestion = { a: 2, b: 2, answer: 4 };
        let options = [];
        let canSelect = true;          // можно ли отвечать
        let nextTimer = null;           // таймер на смену вопроса после переворота
        let autoTimer = null;           // таймер автоматической смены (7 сек)
        let autoMode = false;            // включён ли авто-режим
        let babyMode = true;             // true = младенец (кнопки), false = взрослый (ввод)

        let correct = 0, wrong = 0;

        // ------ Вспомогательные ------
        const random = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function generateQuestion() {
            const a = random(2, 9);
            const b = random(2, 9);
            return { a, b, answer: a * b };
        }

        function generateOptions(correctAns) {
            const opts = new Set();
            opts.add(correctAns);
            while (opts.size < 3) {
                opts.add(random(4, 81));
            }
            return Array.from(opts).sort(() => Math.random() - 0.5);
        }

        // Обновить отображение карточки
        function updateCardDisplay() {
            questionDisplay.textContent = `${currentQuestion.a} × ${currentQuestion.b}`;
            answerDisplay.textContent = currentQuestion.answer;
        }

        // ------ Очистка таймеров ------
        function clearNextTimer() {
            if (nextTimer) {
                clearTimeout(nextTimer);
                nextTimer = null;
            }
        }

        function clearAutoTimer() {
            if (autoTimer) {
                clearTimeout(autoTimer);
                autoTimer = null;
            }
        }

        // Запуск автоматического таймера, если режим включён и можно выбирать
        function startAutoTimer() {
            clearAutoTimer();
            if (autoMode && canSelect) {
                autoTimer = setTimeout(() => {
                    // Автоматическая ошибка
                    if (!canSelect) return; // дополнительная проверка
                    wrong++;
                    wrongSpan.textContent = wrong;

                    // Перевернуть карточку, показать ответ, заблокировать интерфейс
                    canSelect = false;
                    card.classList.add('flipped');
                    disableInputs(true);

                    // Запланировать смену вопроса
                    clearNextTimer();
                    nextTimer = setTimeout(() => {
                        flipAndUpdate();
                    }, 1000);
                }, 7000);
            }
        }

        // Блокировка/разблокировка интерфейса в зависимости от режима
        function disableInputs(disabled) {
            if (babyMode) {
                document.querySelectorAll('.option').forEach(btn => {
                    if (disabled) btn.classList.add('disabled');
                    else btn.classList.remove('disabled');
                });
            } else {
                const input = document.getElementById('answerInput');
                const submit = document.getElementById('submitAnswer');
                if (input) {
                    if (disabled) {
                        input.classList.add('disabled');
                        submit.classList.add('disabled');
                    } else {
                        input.classList.remove('disabled');
                        submit.classList.remove('disabled');
                        input.focus();
                    }
                }
            }
        }

        // ------ Переворот и обновление вопроса (вызывается после окончания показа ответа) ------
        function flipAndUpdate() {
            clearNextTimer();
            clearAutoTimer();

            card.classList.remove('flipped');

            const onTransitionEnd = () => {
                // Генерируем новый вопрос
                currentQuestion = generateQuestion();
                options = generateOptions(currentQuestion.answer);
                updateCardDisplay();

                // Перерисовываем интерфейс в зависимости от режима
                renderAnswerInterface();

                canSelect = true;
                disableInputs(false);

                // Запускаем авто-таймер, если нужно
                startAutoTimer();

                card.removeEventListener('transitionend', onTransitionEnd);
            };
            card.addEventListener('transitionend', onTransitionEnd, { once: true });
        }

        // ------ Обработка ответа (правильного или нет) ------
        function handleAnswer(isCorrect) {
            if (!canSelect) return;

            // Останавливаем авто-таймер (пользователь ответил)
            clearAutoTimer();

            if (isCorrect) {
                correct++;
                correctSpan.textContent = correct;
            } else {
                wrong++;
                wrongSpan.textContent = wrong;
            }

            canSelect = false;
            card.classList.add('flipped');
            disableInputs(true);

            clearNextTimer();
            nextTimer = setTimeout(() => {
                flipAndUpdate();
            }, 1000);
        }

        // ------ Рендер интерфейса (кнопки или ввод) ------
        function renderAnswerInterface() {
            answerContainer.innerHTML = '';

            if (babyMode) {
                // Три кружка
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                options.forEach(num => {
                    const btn = document.createElement('div');
                    btn.className = `option ${!canSelect ? 'disabled' : ''}`;
                    btn.textContent = num;
                    btn.dataset.value = num;
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (!canSelect) return;
                        const selected = parseInt(e.currentTarget.dataset.value, 10);
                        handleAnswer(selected === currentQuestion.answer);
                    });
                    optionsDiv.appendChild(btn);
                });
                answerContainer.appendChild(optionsDiv);
            } else {
                // Поле ввода + кнопка
                const inputArea = document.createElement('div');
                inputArea.className = 'input-area';

                const input = document.createElement('input');
                input.type = 'number';
                input.id = 'answerInput';
                input.inputMode = 'numeric';
                input.placeholder = '?';
                input.classList.toggle('disabled', !canSelect);

                const submitBtn = document.createElement('div');
                submitBtn.id = 'submitAnswer';
                submitBtn.textContent = '✓';
                submitBtn.classList.toggle('disabled', !canSelect);

                inputArea.appendChild(input);
                inputArea.appendChild(submitBtn);
                answerContainer.appendChild(inputArea);

                // Обработчики
                const answerHandler = () => {
                    if (!canSelect) return;
                    const val = parseInt(input.value, 10);
                    if (isNaN(val)) return; // ничего не ввели — игнорируем
                    handleAnswer(val === currentQuestion.answer);
                    input.value = ''; // очистим после ответа
                };

                submitBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    answerHandler();
                });

                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        answerHandler();
                    }
                });
            }
        }

        // ------ Переключение режима (младенец/взрослый) ------
        function toggleMode() {
            babyMode = !babyMode;
            modeBtn.textContent = babyMode ? '👶' : '👨';

            // Сброс счётчиков
            correct = 0;
            wrong = 0;
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;

            // Сброс любых таймеров
            clearNextTimer();
            clearAutoTimer();

            // Генерируем новый вопрос
            currentQuestion = generateQuestion();
            options = generateOptions(currentQuestion.answer);
            updateCardDisplay();

            // Возвращаем карточку в лицевое положение
            card.classList.remove('flipped');
            canSelect = true;

            // Перерисовываем интерфейс
            renderAnswerInterface();

            // Запускаем авто-таймер, если нужно
            startAutoTimer();
        }

        // ------ Переключение авто-режима (песочные часы) ------
        function toggleAutoMode() {
            autoMode = !autoMode;
            timerBtn.classList.toggle('active', autoMode);

            if (autoMode) {
                // Запустить таймер для текущего вопроса, если можно выбирать
                startAutoTimer();
            } else {
                // Просто выключить
                clearAutoTimer();
            }
        }

        // ------ Клик по карточке (ошибочный ответ) ------
        cardWrapper.addEventListener('click', (e) => {
            // Клик должен быть именно по карточке (или её дочерним), а не по кнопкам
            if (!e.target.closest('.card')) return;
            if (!canSelect) return;

            // В режиме взрослого клик по карточке тоже считаем ошибкой
            handleAnswer(false);
        });

        // ------ Инициализация ------
        currentQuestion = generateQuestion();
        options = generateOptions(currentQuestion.answer);
        updateCardDisplay();
        renderAnswerInterface();

        // Кнопки управления
        timerBtn.addEventListener('click', toggleAutoMode);
        modeBtn.addEventListener('click', toggleMode);

        // Стартовое состояние кнопок
        timerBtn.classList.toggle('active', autoMode);
        modeBtn.textContent = babyMode ? '👶' : '👨';
    })();
</script>
</body>
</html>
