<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секреты здоровья — игра-путешествие</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Neue', 'Segoe UI', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fde9e0 0%, #fff2d7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* главная карточка игры */
        .game-box {
            width: 1300px;
            max-width: 100%;
            height: 90vh;
            background: #feffe6;
            border-radius: 80px 80px 50px 50px;
            border: 6px solid #ffb56b;
            box-shadow: 0 20px 0 #c5652e, 0 30px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* область контента */
        .screen {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: #fffef8;
            border-bottom: 4px solid #ffb56b;
        }

        /* навигация по раундам (внизу) */
        .round-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 15px 20px;
            background: #ffdbb5;
            border-top: 4px solid #ff9f4b;
        }

        .nav-btn {
            background: white;
            border: 4px solid #ff8124;
            color: #b3440e;
            font-size: 2.5rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 7px 0 #b9520e;
            transition: 0.07s linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active {
            transform: translateY(7px);
            box-shadow: none;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 7px 0 #b9520e;
            pointer-events: none;
        }

        .round-indicator {
            background: #ffa75c;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            padding: 10px 35px;
            border-radius: 60px;
            border: 4px solid #fff1b5;
            text-shadow: 2px 2px 0 #b14f0a;
        }

        /* шапка раунда */
        .round-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }

        .round-icon {
            font-size: 3.5rem;
            background: #fdd8b1;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #fc9e4c;
            box-shadow: 0 5px 0 #b25713;
        }

        .round-title {
            font-size: 3rem;
            font-weight: 800;
            color: #9d4216;
            text-shadow: 3px 3px 0 #ffb377;
            letter-spacing: 1px;
        }

        /* область вопроса / контента */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .question-scene {
            flex: 1;
            background: #fff6e0;
            border-radius: 60px;
            border: 5px solid #ffb055;
            box-shadow: inset 0 -5px 0 #e09e5d, 0 10px 15px rgba(251, 157, 35, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-size: 2rem;
            font-weight: 600;
            color: #62371a;
            text-align: center;
            line-height: 1.5;
            overflow-y: auto;
        }

        .question-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 5px;
        }

        .arrow-left, .arrow-right {
            background: #ffbe6e;
            border: 4px solid #d46f21;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 0 #aa4f14;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-left:active, .arrow-right:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .arrow-left.disabled, .arrow-right.disabled {
            opacity: 0.3;
            pointer-events: none;
            box-shadow: 0 6px 0 #aa4f14;
        }

        .counter {
            font-size: 1.8rem;
            background: #ffdbb5;
            padding: 8px 30px;
            border-radius: 40px;
            border: 3px solid #fe9f47;
            font-weight: 700;
            color: #78431a;
        }

        /* специальный экран рефлексии */
        .reflection-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .leaf-buttons {
            display: flex;
            gap: 60px;
            justify-content: center;
        }

        .leaf-btn {
            font-size: 5rem;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 8px 0 rgba(0,0,0,0.2));
        }

        .leaf-btn:active {
            transform: translateY(8px);
            filter: drop-shadow(0 0 0 rgba(0,0,0,0.2));
        }

        .leaf-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            min-height: 150px;
            background: #ebd9b4;
            border-radius: 70px;
            padding: 30px;
            width: 100%;
            border: 5px dashed #ac7b4a;
        }

        .leaf-item {
            font-size: 3rem;
            animation: pop 0.2s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* главный экран */
        .main-title {
            font-size: 5rem;
            font-weight: 900;
            color: #f5771e;
            text-shadow: 5px 5px 0 #ffc896, 8px 8px 0 #b3520e;
            text-align: center;
            margin-bottom: 30px;
        }

        .sub-title {
            font-size: 2.5rem;
            color: #ad6337;
            text-align: center;
        }

        .start-hint {
            margin-top: 50px;
            font-size: 2rem;
            background: #ffc489;
            border-radius: 40px;
            padding: 20px 40px;
            display: inline-block;
            border: 5px solid #f0761f;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-10px); }
        }

        /* адаптация */
        @media (max-width: 800px) {
            .round-title { font-size: 2rem; }
            .question-scene { font-size: 1.5rem; }
            .main-title { font-size: 3rem; }
        }
    </style>
</head>
<body>
<div class="game-box">
    <!-- динамический экран -->
    <div id="screen" class="screen"></div>

    <!-- навигация по раундам -->
    <div class="round-nav">
        <button class="nav-btn" id="prevRoundBtn" disabled>←</button>
        <span class="round-indicator" id="roundIndicator">1 / 6</span>
        <button class="nav-btn" id="nextRoundBtn">→</button>
    </div>
</div>

<script>
    (function() {
        // Данные раундов (6 штук)
        const rounds = [
            { // 0: Главный экран
                type: 'main',
                icon: '🏠',
                title: 'Главная',
                data: null
            },
            { // 1: Раунд 1 — Загадки
                type: 'qa',
                icon: '❓',
                title: 'Раунд 1. Загадки',
                items: [
    'Маленькое, пушистое, с мягкой щетиной или поролоном внутри. Если его намылить, оно дает много пены. Что это?',
    'Маленький, с острым кончиком и щетинками на головке. Живет в стаканчике в ванной. Его лучшие друзья — паста и нить. Для чего он нужен?',
    'Вода льется сверху мелкими струйками, как теплый дождик. Под ним приятно стоять утром, чтобы проснуться, или вечером, чтобы смыть усталость. Как называется это устройство?',
    'Стеклянная трубочка с жидкостью и шкалой. Когда человек заболевает, жидкость поднимается вверх. Что это?',
    'Чередование дел в течение дня: когда ты встаешь, когда делаешь уроки, когда гуляешь и когда ложишься спать. О чем речь?',
    'Маленький бумажный пакетик или коробочка, которая всегда должна лежать в аптечке и в рюкзаке в походе. Там лежат таблетки, бинт и пластырь на случай, если кто-то поранится или заболеет. Что это?',
    'Вид спорта, где нужно плыть. Бывает кролем, брассом и баттерфляем. Очень полезно для спины и легких. Что это за активность?',
    'Две деревянные или пластиковые палки, две лыжи и ботинки с креплениями. Нужны для того, чтобы кататься зимой по снегу. Что это за инвентарь?',
    'Жидкость белого цвета, которую дают коровы. Дети обязательно должны ее пить, потому что в ней много кальция для роста костей и зубов. Что это?',
    'Жидкое или кусковое средство, которое убивает микробов. Им обязательно нужно пользоваться перед едой и после улицы. Дружит с водой. О чем речь?'
]
            },
            { // 2: Раунд 2 — Продукты (Вершки и корешки)
                type: 'qa',
                icon: '🍏',
                title: 'Раунд 2. Продукты',
                items: [
                    '🍎 Яблоко',
                    '🍭 Чупа-чупс',
                    '🥕 Морковь',
                    '🍟 Чипсы',
                    '🐟 Рыба',
                    '🥤 Кока-кола',
                    '🌾 Гречка',
                    '🍬 Жвачка',
                    '🍶 Молоко',
                    '🍖 Копчёная колбаса',
                    '🌰 Орехи',
                    '🍞 Сухарики из магазина'
                ]
            },
            { // 3: Раунд 3 — Ситуации (Скорая помощь)
                type: 'qa',
                icon: '🚑',
                title: 'Раунд 3. Ситуации',
                items: [
                    '💧 Друг порезал палец, идёт кровь. Твои действия?',
                    '🍎 Пришёл с улицы, на столе немытое яблоко и пирожное. Что выберешь и что сделаешь сначала?',
                    '📱 После долгого сидения в телефоне разболелась голова. Что будешь делать?',
                    '🏥 Утром ты почувствовал слабость и боль в горле. Как поступишь?',
                    '😁 После сладкого заболел зуб. Какая первая помощь? (к врачу, полоскание)'
                ]
            },
            { // 4: Раунд 4 — Блиц для капитанов
                type: 'qa',
                icon: '⚡',
                title: 'Раунд 4. Блиц',
                items: [
                    'Правда ли, что чистить зубы нужно 2 раза в день?',
                    'Правда ли, что кактусы снимают излучение от компьютера?',
                    'Зарядка может заменить завтрак?',
                    'Морковь улучшает зрение?',
                    'Можно не мыть руки перед кормлением кошки?',
                    'Летом можно накопить витамины на всю зиму?',
                    'Проглоченная жвачка остаётся в желудке на 7 лет?',
                    'Смартфон грязнее сиденья унитаза?'
                ]
            },
            { // 5: Рефлексия
                type: 'reflection',
                icon: '🌿',
                title: 'Дерево здоровья',
                data: null
            }
        ];

        let currentRound = 0;          // индекс текущего раунда
        let currentItem = 0;           // индекс внутри раунда (для type=qa)

        const screenEl = document.getElementById('screen');
        const prevRoundBtn = document.getElementById('prevRoundBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const roundIndicator = document.getElementById('roundIndicator');

        // вспомогательная функция обновления кнопок раундов
        function updateRoundNav() {
            roundIndicator.textContent = `${currentRound+1} / ${rounds.length}`;
            prevRoundBtn.disabled = (currentRound === 0);
            nextRoundBtn.disabled = (currentRound === rounds.length - 1);
        }

        // отрисовка текущего раунда
        function renderScreen() {
            const round = rounds[currentRound];
            let html = '';

            // шапка (кроме главного экрана, там своё)
            if (round.type !== 'main') {
                html += `<div class="round-header">`;
                html += `<div class="round-icon">${round.icon}</div>`;
                html += `<div class="round-title">${round.title}</div>`;
                html += `</div>`;
            }

            // контент в зависимости от типа
            if (round.type === 'main') {
                html += `
                    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                        <div class="sub-title">Игра-путешествие</div>
                        <div class="main-title">🍏 Секреты здоровья 🍎</div>
                        <div class="start-hint">Нажимай → чтобы начать!</div>
                    </div>
                `;
            }
            else if (round.type === 'qa') {
                const total = round.items.length;
                const question = round.items[currentItem];
                html += `<div class="content-area">`;
                html += `<div class="question-scene">${question}</div>`;
                html += `<div class="question-footer">`;
                // стрелка влево
                html += `<div class="arrow-left ${currentItem === 0 ? 'disabled' : ''}" id="prevItem">←</div>`;
                html += `<span class="counter">${currentItem+1} / ${total}</span>`;
                html += `<div class="arrow-right ${currentItem === total-1 ? 'disabled' : ''}" id="nextItem">→</div>`;
                html += `</div>`;
                html += `</div>`;
            }
            else if (round.type === 'reflection') {
                html += `
                    <div class="reflection-area">

                        <div class="leaf-buttons">
                            <button class="leaf-btn" id="greenLeafBtn" style="color:#3e9c47;">🍃</button>
                            <button class="leaf-btn" id="yellowLeafBtn" style="color:#e2a13f;">🍂</button>
                        </div>
                        <div class="leaf-container" id="leafContainer">
                            <!-- сюда будут добавляться листья -->
                        </div>
                        
                    </div>
                `;
            }

            screenEl.innerHTML = html;

            // обработчики для стрелок внутри раунда (qa)
            if (round.type === 'qa') {
                const prevBtn = document.getElementById('prevItem');
                const nextBtn = document.getElementById('nextItem');
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (currentItem > 0) {
                            currentItem--;
                            renderScreen();
                        }
                    });
                }
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        if (currentItem < round.items.length - 1) {
                            currentItem++;
                            renderScreen();
                        }
                    });
                }
            }

            // обработчики для рефлексии
            if (round.type === 'reflection') {
                const greenBtn = document.getElementById('greenLeafBtn');
                const yellowBtn = document.getElementById('yellowLeafBtn');
                const container = document.getElementById('leafContainer');

                if (greenBtn) {
                    greenBtn.addEventListener('click', () => {
                        const leaf = document.createElement('span');
                        leaf.className = 'leaf-item';
                        leaf.textContent = '🍃';
                        leaf.style.color = '#3e9c47';
                        container.appendChild(leaf);
                    });
                }
                if (yellowBtn) {
                    yellowBtn.addEventListener('click', () => {
                        const leaf = document.createElement('span');
                        leaf.className = 'leaf-item';
                        leaf.textContent = '🍂';
                        leaf.style.color = '#e2a13f';
                        container.appendChild(leaf);
                    });
                }
            }

            updateRoundNav();
        }

        // переключение раундов
        prevRoundBtn.addEventListener('click', () => {
            if (currentRound > 0) {
                currentRound--;
                currentItem = 0;   // сбрасываем индекс вопроса
                renderScreen();
            }
        });

        nextRoundBtn.addEventListener('click', () => {
            if (currentRound < rounds.length - 1) {
                currentRound++;
                currentItem = 0;
                renderScreen();
            }
        });

        // инициализация
        renderScreen();
    })();
</script>
</body>
</html>
