<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Здорово быть здоровым! — игра для 5 класса</title>
    <style>
        /* Стили без изменений (оставлены как в оригинале) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f2fa 100%);
            color: #1a3e4c;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
        }

        .presentation {
            width: 100%;
            max-width: 1300px;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(3px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 40, 50, 0.4);
            padding: 20px 30px 20px 30px;
            border: 2px solid rgba(140, 210, 200, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .round-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-top: 10px;
        }

        .round-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 3px dashed #8fc5bf;
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .round-icon {
            font-size: 2.2rem;
            background: #e0f2ef;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #2f8275;
            color: #0a4f55;
        }

        .round-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #105e67;
            line-height: 1.2;
        }

        .question-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            min-height: 0;
        }

        .nav-arrow {
            background: white;
            border: 3px solid #2a7f73;
            color: #025e68;
            font-size: 3rem;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 0 #1b5e55;
            transition: 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-arrow:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .nav-arrow.disabled {
            opacity: 0.3;
            pointer-events: none;
            box-shadow: 0 6px 0 #1b5e55;
        }

        .question-card {
            background: white;
            border-radius: 40px;
            padding: 30px 40px;
            border: 2px solid #9fd0cb;
            box-shadow: 10px 12px 0 #8fc5bf;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            font-size: 1.8rem;
            font-weight: 600;
            color: #015e6b;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.5;
        }

        .question-indicator {
            text-align: center;
            font-size: 1.3rem;
            margin-top: 15px;
            color: #1f6e62;
            font-weight: 500;
            flex-shrink: 0;
        }

        .round-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 15px;
            flex-shrink: 0;
        }

        .round-btn {
            background: white;
            border: 3px solid #2a7f73;
            color: #025e68;
            font-size: 2rem;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b5e55;
            transition: 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .round-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .round-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .round-indicator {
            background: #2a7f73;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 8px 30px;
            border-radius: 60px;
            border: 3px solid #c4e6e1;
        }

        .special-card {
            background: #d2ebe7;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 3px solid #278577;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            color: #015e6b;
        }

        @media (max-width: 700px) {
            .presentation { padding: 15px; }
            .question-card { font-size: 1.4rem; padding: 20px; }
            .round-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="presentation">
    <div id="roundContainer" class="round-container"></div>
    <div class="round-nav">
        <button class="round-btn" id="prevRoundBtn" disabled>←</button>
        <span class="round-indicator" id="roundIndicator">1 / 5</span>
        <button class="round-btn" id="nextRoundBtn">→</button>
    </div>
</div>

<script>
    (function() {
        // Данные игры: 5 раундов (удалён бесполезный комментарий)
        const rounds = [
            {   // 0: Разминка
                type: 'questions',
                icon: '🏃‍',
                title: 'Разминка',
                questions: [
                    '1. Утром раньше поднимайся, прыгай, бегай, отжимайся. Для здоровья, для порядка людям всем нужна…',
                    '2. Кто на льду меня догонит? Мы бежим вперегонки. А несут меня не кони, а блестящие…',
                    '3. Костяная спинка, жесткая щетинка, с мятной пастой дружит, нам усердно служит.',
                    '4. Чтоб большим спортсменом стать, нужно очень много знать. И поможет здесь сноровка и, конечно,…',
                    '5. В овощах и фруктах есть. Детям нужно много есть. Есть ещё таблетки вкусом, как конфетки. Принимают не для шалости, потому что это…',
                    '6. Он — холодный, он — приятный, с ним дружу давно, ребята. Он водой на нас польет, станем все здоровы!',
                    '7. Гладкое, душистое, моет чисто. Нужно, чтоб у каждого было... Что это?',
                    '8. Дождик теплый и густой, этот дождик не простой: Он без туч, без облаков, целый день идти готов.',
                    '9. Вафельное и полосатое, ворсистое и мохнатое, всегда под рукою — что это такое?',
                    '10. У неё с утра дела: чистить зубы добела.'
                ]
            },
            {   // 1: Гигиена и режим
                type: 'questions',
                icon: '⏰',
                title: 'Гигиена и режим',
                questions: [
                    'Команда 1: Воде-водице, пловцам пригодится. А ну, плесни-ка на него водицы! В ныряльщика превратится он вмиг. Что это?',
                    'Команда 1: Сколько раз в день рекомендуется чистить зубы?',
                    'Команда 1: Что такое режим дня?',
                    'Команда 1: Сколько минут нужно уделять утренней зарядке?',
                    'Команда 2: Инструмент бывалый — не большой, не малый. У него полно забот: он и режет, и стрижет.',
                    'Команда 2: Зачем нужно мыть руки перед едой?',
                    'Команда 2: Сколько часов в сутки должен спать пятиклассник?',
                    'Команда 2: Как часто нужно проветривать комнату перед сном?',
                    '➕ Дополнительно: Можно ли давать свою расчёску другу? Почему?',
                    '➕ Дополнительно: Зачем нужен дезодорант?'
                ]
            },
            {   // 2: Зелёная аптека
                type: 'questions',
                icon: '🌿',
                title: 'Зелёная аптека',
                questions: [
                    '1. Листья похожи на копьё, растёт у дорог, останавливает кровь.',
                    '2. «Солнечная ягода», повышает аппетит, варенье — лучший друг простуды.',
                    '3. Цветок с мужским именем, настой лечит горло.',
                    '4. Жгучая трава, из неё варят щи, очищает кровь.',
                    '5. Растение на окне, лечит раны, насморк.',
                    '6. Цветки этого дерева заваривают с мёдом от простуды.'
                ]
            },
            {   // 3: Пантомимы
                type: 'special',
                icon: '🎭',
                title: 'Пантомимы',
                content: 'ПАНТОМИМЫ'
            },
            {   // 4: Веришь – Не веришь
                type: 'questions',
                icon: '❓',
                title: 'Веришь – Не веришь',
                questions: [
                    '1. Кактусы у компьютера поглощают вредное излучение?',
                    '2. Морковь улучшает зрение?',
                    '3. От улыбки и смеха повышается иммунитет?',
                    '4. Чипсы полезны для сердца, потому что хрустят и радуют?',
                    '5. Зимой простудиться легче, чем летом?',
                    '6. Если есть много шоколада, появятся прыщи?',
                    '7. Человек может прожить без еды дольше, чем без сна?',
                    '8. Самое высокое кровяное давление у жирафа?',
                    '9. Проглоченная жвачка остаётся в желудке на 7 лет?',
                    '10. Смартфон грязнее сиденья унитаза?'
                ]
            }
        ];

        // Состояние
        let currentRound = 0;
        let currentQuestionIndex = 0;

        // DOM элементы
        const roundContainer = document.getElementById('roundContainer');
        const prevRoundBtn = document.getElementById('prevRoundBtn');
        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const roundIndicator = document.getElementById('roundIndicator');

        // Универсальный обработчик кликов (делегирование для стрелок вопросов)
        roundContainer.addEventListener('click', (e) => {
            const target = e.target.closest('.nav-arrow');
            if (!target) return;
            if (target.disabled) return; // не реагируем на заблокированные кнопки

            const round = rounds[currentRound];
            if (round.type !== 'questions') return;

            if (target.id === 'prevQuestionBtn' && currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderRound();
            } else if (target.id === 'nextQuestionBtn' && currentQuestionIndex < round.questions.length - 1) {
                currentQuestionIndex++;
                renderRound();
            }
        });

        function renderRound() {
            const round = rounds[currentRound];
            let html = '';

            // Шапка раунда
            html += `<div class="round-header">`;
            html += `<div class="round-icon">${round.icon}</div>`;
            html += `<div class="round-title">${round.title}</div>`;
            html += `</div>`;

            if (round.type === 'special') {
                // Специальный слайд
                html += `<div class="special-card">${round.content}</div>`;
            } else {
                // Раунд с вопросами
                const total = round.questions.length;
                const questionText = round.questions[currentQuestionIndex];

                html += `<div class="question-area">`;
                // стрелки с условным disabled
                html += `<div class="nav-arrow" id="prevQuestionBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>←</div>`;
                html += `<div class="question-card">${questionText}</div>`;
                html += `<div class="nav-arrow" id="nextQuestionBtn" ${currentQuestionIndex === total-1 ? 'disabled' : ''}>→</div>`;
                html += `</div>`;
                html += `<div class="question-indicator">Вопрос ${currentQuestionIndex+1} из ${total}</div>`;
            }

            roundContainer.innerHTML = html;

            // Обновить индикатор раунда и состояние кнопок раундов
            roundIndicator.textContent = `${currentRound+1} / ${rounds.length}`;
            prevRoundBtn.disabled = currentRound === 0;
            nextRoundBtn.disabled = currentRound === rounds.length - 1;
        }

        // Переключение раундов
        prevRoundBtn.addEventListener('click', () => {
            if (currentRound > 0) {
                currentRound--;
                currentQuestionIndex = 0;
                renderRound();
            }
        });

        nextRoundBtn.addEventListener('click', () => {
            if (currentRound < rounds.length - 1) {
                currentRound++;
                currentQuestionIndex = 0;
                renderRound();
            }
        });

        // Инициализация
        renderRound();
    })();
</script>
</body>
</html>
